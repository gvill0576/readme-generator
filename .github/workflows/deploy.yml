name: Deploy and Run AI README Generator

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Run AI Workflow
        run: |
          echo "Triggering AI README Generation..."
          BUCKET_NAME=$(terraform output -raw readme_bucket_name)
          REPO_URL="https://github.com/gvill0576/readme-generator"
          ENCODED="https---github.com-gvill0576-readme-generator"
          touch ${ENCODED}
          aws s3 cp ${ENCODED} s3://${BUCKET_NAME}/inputs/${ENCODED}
          rm ${ENCODED}
          echo "Workflow triggered for ${REPO_URL}."